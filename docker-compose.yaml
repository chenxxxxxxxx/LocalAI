services:
  api:
    # Intel Core Ultra 9 285H + Arc 140T 集显专用配置
    # 定位：开发工作站（LocalAI 推理 + Go 语言开发共存）
    # 镜像列表（quay.io）: https://quay.io/repository/go-skynet/local-ai?tab=tags
    # 镜像列表（dockerhub）: https://hub.docker.com/r/localai/localai
    image: localai/localai:latest-gpu-intel
    build:
      context: .
      dockerfile: Dockerfile
      args:
      - IMAGE_TYPE=core
      - BASE_IMAGE=ubuntu:24.04
      - BUILD_TYPE=intel
    ports:
      - 8080:8080
    env_file:
      - .env.intel-285h
    environment:
      - MODELS_PATH=/models
      - DEBUG=true
      # 285H 共享内存有限，建议开启单后端模式
      - LOCALAI_SINGLE_ACTIVE_BACKEND=true
      # 可选：强制 Intel 后端（跳过自动检测）
      # - LOCALAI_FORCE_META_BACKEND_CAPABILITY=intel
    devices:
      - /dev/dri           # ⚠️ 必须挂载，否则无法使用 Intel GPU
    volumes:
      - ./models:/models
      - ./generated/images:/tmp/generated/images
      - ./data:/data
      - backends:/backends       # 缓存后端镜像，避免重复下载
      - configuration:/configuration  # 持久化运行时配置
    # 资源限制：防止容器挤占宿主机 Go 编译/IDE 资源
    # 285H 共 16 线程，限制容器使用 10 个（留 6 给宿主机开发工具）
    # 96GB 总内存，分配 40G 给容器（留 ~56G 给 OS + Go 编译 + IDE）
    deploy:
      resources:
        limits:
          cpus: '10'
          memory: 40G
        reservations:
          devices:
            - capabilities: [gpu]
    # command:
    #   - gemma4-e4b         # 可选：指定启动时预加载的模型名称

  ## Uncomment for PostgreSQL-backed knowledge base (see Agents docs)
  # postgres:
